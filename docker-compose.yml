services:
  # TimescaleDB Database - Default for production (time-series optimized)
  # Uses TimescaleDB extension on PostgreSQL for optimized time-series queries
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: rdt-timescaledb
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rdt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rdt_trading}
      PGDATA: /var/lib/postgresql/data/pgdata
      # TimescaleDB tuning (adjust based on available memory)
      TIMESCALEDB_TELEMETRY: "off"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/timescale-init.sql:/docker-entrypoint-initdb.d/01-timescale-init.sql:ro,z
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/02-postgres-init.sql:ro,z
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdt} -d ${POSTGRES_DB:-rdt_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # Plain PostgreSQL Database - Alternative for environments without TimescaleDB
  # Use this with: docker-compose --profile postgres-only up db-postgres
  db-postgres:
    image: postgres:15-alpine
    container_name: rdt-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rdt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-rdt_trading}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-only-data:/var/lib/postgresql/data
      - ./docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql:ro,z
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rdt} -d ${POSTGRES_DB:-rdt_trading}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - postgres-only

  # Scanner Service - Semi-automated signal scanning
  scanner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-scanner
    command: ["scanner"]
    volumes:
      - ./data:/app/data:z
      - ./.env:/app/.env:ro,z
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
      # OpenTelemetry Tracing Configuration
      - OTEL_SERVICE_NAME=rdt-trading-scanner
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER=${OTEL_EXPORTER:-jaeger}
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - scanner

  # Trading Bot - Autonomous trading
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-bot
    command: ["bot"]
    volumes:
      - ./data:/app/data:z
      - ./.env:/app/.env:ro,z
      - schwab-tokens:/home/trader/.rdt-trading
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
      # OpenTelemetry Tracing Configuration
      - OTEL_SERVICE_NAME=rdt-trading-bot
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER=${OTEL_EXPORTER:-jaeger}
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - bot

  # Auto-Trading Bot (CAUTION!)
  bot-auto:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-bot-auto
    command: ["bot", "--auto"]
    volumes:
      - ./data:/app/data:z
      - ./.env:/app/.env:ro,z
      - schwab-tokens:/home/trader/.rdt-trading
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - bot-auto

  # Dashboard - Monitoring
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-dashboard
    command: ["dashboard"]
    volumes:
      - ./data:/app/data:ro,z
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    tty: true
    stdin_open: true
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dashboard

  # Backtesting Service
  backtest:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-backtest
    command: ["backtest", "--days", "365"]
    volumes:
      - ./data:/app/data:z
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backtest

  # Enhanced Backtesting Service
  backtest-enhanced:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-backtest-enhanced
    command: ["backtest", "--enhanced", "--days", "365", "--watchlist", "full"]
    volumes:
      - ./data:/app/data:z
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backtest-enhanced

  # Parameter Optimization Service
  optimize:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-optimize
    command: ["optimize", "--days", "365", "--watchlist", "core"]
    volumes:
      - ./data:/app/data:z
    environment:
      - TZ=America/New_York
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - optimize

  # ML Model Trainer - Train regime detector and ML models
  model-trainer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-model-trainer
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo '=== RDT ML Model Training ===' &&
        echo 'Training Regime Detector...' &&
        python scripts/train_regime_detector.py --visualize 2>&1 || echo 'Regime training skipped' &&
        echo '' &&
        echo '=== Training Complete ===' &&
        ls -la /app/models/ 2>/dev/null || echo 'No models directory yet'
    volumes:
      - ./data:/app/data:z
      - ./models:/app/models:z
      - ./logs:/app/logs:z
      - ./results:/app/results:z
      - ./ml/data:/app/ml/data:z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - training

  # Web Dashboard - GUI for monitoring and signals
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: requirements-web.txt
        INSTALL_ML: "false"
    container_name: rdt-web
    entrypoint: ["python", "web/app.py"]
    ports:
      - "8899:8080"
    volumes:
      - ./data:/app/data:z
      - ./.env:/app/.env:ro,z
      - ./web:/app/web:z
      - ./agents:/app/agents:z
      - ./shared:/app/shared:z
      - ./brokers:/app/brokers:z
      - ./ml:/app/ml:z
      - ./payments:/app/payments:z
      - ./alerts:/app/alerts:z
      - ./risk:/app/risk:z
      - ./monitoring:/app/monitoring:z
      - ./config:/app/config:z
      - ./scanner:/app/scanner:z
      - ./options:/app/options:z
      - ./strategies:/app/strategies:z
      - ./trading:/app/trading:z
      - ./migrations:/app/migrations:z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - FLASK_ENV=development
      - PORT=8080
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
      # OpenTelemetry Tracing Configuration
      - OTEL_SERVICE_NAME=rdt-trading-web
      - OTEL_ENABLED=${OTEL_ENABLED:-true}
      - OTEL_EXPORTER=${OTEL_EXPORTER:-jaeger}
      - JAEGER_ENDPOINT=http://jaeger:14268/api/traces
      - OTEL_TRACES_SAMPLER=parentbased_always_on
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - web

  # Interactive shell for development/debugging
  shell:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-shell
    entrypoint: ["/bin/bash"]
    volumes:
      - ./data:/app/data:z
      - ./models:/app/models:z
      - ./logs:/app/logs:z
      - ./.env:/app/.env:ro,z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    tty: true
    stdin_open: true
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - dev

  # Database initialization service
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-db-init
    entrypoint: ["python", "scripts/init_db.py"]
    volumes:
      - ./data:/app/data:z
      - ./.env:/app/.env:ro,z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - init

  # Database backup service
  db-backup:
    image: postgres:15-alpine
    container_name: rdt-db-backup
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        pg_dump -h db -U ${POSTGRES_USER:-rdt} -d ${POSTGRES_DB:-rdt_trading} -F c -f /backups/rdt_trading_$(date +%Y%m%d_%H%M%S).dump &&
        echo "Backup completed successfully"
    environment:
      - PGPASSWORD=${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups:z
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - backup

  # Data Retention Service - Archive and clean up old data
  retention:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-retention
    entrypoint: ["python", "scripts/run_retention.py"]
    command: ["clean", "--no-dry-run", "--force"]
    volumes:
      - ./data:/app/data:z
      - ./archives:/app/archives:z
      - ./.env:/app/.env:ro,z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
      # Retention configuration
      - RETENTION_SIGNALS_DAYS=${RETENTION_SIGNALS_DAYS:-90}
      - RETENTION_TRADES_DAYS=${RETENTION_TRADES_DAYS:-0}
      - RETENTION_POSITIONS_DAYS=${RETENTION_POSITIONS_DAYS:-365}
      - RETENTION_DAILY_STATS_DAYS=${RETENTION_DAILY_STATS_DAYS:-730}
      - RETENTION_AUDIT_LOGS_DAYS=${RETENTION_AUDIT_LOGS_DAYS:-2555}
      - RETENTION_SESSIONS_DAYS=${RETENTION_SESSIONS_DAYS:-30}
      - RETENTION_API_LOGS_DAYS=${RETENTION_API_LOGS_DAYS:-90}
      - RETENTION_ML_PREDICTIONS_DAYS=${RETENTION_ML_PREDICTIONS_DAYS:-180}
      - RETENTION_ARCHIVE_PATH=/app/archives
      - RETENTION_ARCHIVE_FORMAT=${RETENTION_ARCHIVE_FORMAT:-json_gz}
      - RETENTION_BATCH_SIZE=${RETENTION_BATCH_SIZE:-1000}
      - RETENTION_DRY_RUN_DEFAULT=false
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - retention

  # Scheduled Retention Service - Runs on cron schedule
  retention-scheduled:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rdt-retention-scheduled
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "RDT Data Retention Service (Scheduled)"
        echo "Schedule: ${RETENTION_CLEANUP_SCHEDULE:-0 3 * * *}"
        echo "Installing cron..."
        apt-get update -qq && apt-get install -qq -y cron > /dev/null 2>&1 || true

        # Create cron job
        echo "${RETENTION_CLEANUP_SCHEDULE:-0 3 * * *} cd /app && python scripts/run_retention.py clean --no-dry-run --force >> /var/log/retention.log 2>&1" > /etc/cron.d/retention
        chmod 0644 /etc/cron.d/retention
        crontab /etc/cron.d/retention

        # Start cron in foreground
        echo "Starting scheduled retention service..."
        touch /var/log/retention.log
        cron && tail -f /var/log/retention.log
    volumes:
      - ./data:/app/data:z
      - ./archives:/app/archives:z
      - ./.env:/app/.env:ro,z
    environment:
      - TZ=America/New_York
      - PYTHONPATH=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER:-rdt}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-rdt_trading}
      - RETENTION_CLEANUP_SCHEDULE=${RETENTION_CLEANUP_SCHEDULE:-0 3 * * *}
      - RETENTION_SIGNALS_DAYS=${RETENTION_SIGNALS_DAYS:-90}
      - RETENTION_TRADES_DAYS=${RETENTION_TRADES_DAYS:-0}
      - RETENTION_POSITIONS_DAYS=${RETENTION_POSITIONS_DAYS:-365}
      - RETENTION_DAILY_STATS_DAYS=${RETENTION_DAILY_STATS_DAYS:-730}
      - RETENTION_AUDIT_LOGS_DAYS=${RETENTION_AUDIT_LOGS_DAYS:-2555}
      - RETENTION_SESSIONS_DAYS=${RETENTION_SESSIONS_DAYS:-30}
      - RETENTION_API_LOGS_DAYS=${RETENTION_API_LOGS_DAYS:-90}
      - RETENTION_ML_PREDICTIONS_DAYS=${RETENTION_ML_PREDICTIONS_DAYS:-180}
      - RETENTION_ARCHIVE_PATH=/app/archives
      - RETENTION_ARCHIVE_FORMAT=${RETENTION_ARCHIVE_FORMAT:-json_gz}
      - RETENTION_BATCH_SIZE=${RETENTION_BATCH_SIZE:-1000}
      - RETENTION_DRY_RUN_DEFAULT=false
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - retention-scheduled

  # Redis (optional, for caching/queues)
  redis:
    image: redis:7-alpine
    container_name: rdt-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - cache

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: rdt-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - monitoring

  # Grafana Loki - Log aggregation
  loki:
    image: grafana/loki:2.9.2
    container_name: rdt-loki
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./docker/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    ports:
      - "${LOKI_PORT:-3100}:3100"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - monitoring

  # Grafana - Dashboards and visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: rdt-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_SECURITY_SECRET_KEY=${GRAFANA_SECRET_KEY:-SW2YcwTIb9zpOOhoPsMm}
      - GF_AUTH_ANONYMOUS_ENABLED=${GRAFANA_ANONYMOUS_ENABLED:-false}
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - ./docker/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./docker/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    restart: unless-stopped
    networks:
      - rdt-network
    depends_on:
      - prometheus
      - loki
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    profiles:
      - monitoring

  # Jaeger - Distributed Tracing
  jaeger:
    image: jaegertracing/all-in-one:1.52
    container_name: rdt-jaeger
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
      - COLLECTOR_OTLP_ENABLED=true
      - SPAN_STORAGE_TYPE=badger
      - BADGER_EPHEMERAL=false
      - BADGER_DIRECTORY_VALUE=/badger/data
      - BADGER_DIRECTORY_KEY=/badger/key
    volumes:
      - jaeger-data:/badger
    ports:
      # Jaeger UI
      - "${JAEGER_UI_PORT:-16686}:16686"
      # Collector HTTP (for Thrift)
      - "${JAEGER_COLLECTOR_HTTP_PORT:-14268}:14268"
      # Collector gRPC
      - "${JAEGER_COLLECTOR_GRPC_PORT:-14250}:14250"
      # Agent UDP compact thrift
      - "${JAEGER_AGENT_UDP_PORT:-6831}:6831/udp"
      # Agent UDP binary thrift
      - "${JAEGER_AGENT_BINARY_PORT:-6832}:6832/udp"
      # Zipkin compatible endpoint
      - "${JAEGER_ZIPKIN_PORT:-9411}:9411"
      # OTLP gRPC
      - "${JAEGER_OTLP_GRPC_PORT:-4317}:4317"
      # OTLP HTTP
      - "${JAEGER_OTLP_HTTP_PORT:-4318}:4318"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:14269/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - tracing

  # Zipkin - Alternative distributed tracing backend
  zipkin:
    image: openzipkin/zipkin:3
    container_name: rdt-zipkin
    environment:
      - STORAGE_TYPE=mem
      - JAVA_OPTS=-Xms128m -Xmx256m
    ports:
      - "${ZIPKIN_PORT:-9412}:9411"
    restart: unless-stopped
    networks:
      - rdt-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:9411/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    profiles:
      - tracing-zipkin

networks:
  rdt-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  postgres-only-data:
    driver: local
  redis-data:
    driver: local
  schwab-tokens:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  loki-data:
    driver: local
  archive-data:
    driver: local
  jaeger-data:
    driver: local
