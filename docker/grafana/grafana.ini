# Grafana Configuration for RDT Trading System

[server]
protocol = http
http_port = 3000
domain = localhost
root_url = %(protocol)s://%(domain)s:%(http_port)s/

[security]
admin_user = ${GF_SECURITY_ADMIN_USER:admin}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD:admin}
secret_key = ${GF_SECURITY_SECRET_KEY:SW2YcwTIb9zpOOhoPsMm}
disable_gravatar = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_id = 1
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = ${GF_AUTH_ANONYMOUS_ENABLED:false}
org_name = RDT Trading
org_role = Viewer

[dashboards]
default_home_dashboard_path = /var/lib/grafana/dashboards/trading-overview.json
min_refresh_interval = 5s

[alerting]
enabled = true
execute_alerts = true

[unified_alerting]
enabled = true

[feature_toggles]
enable = publicDashboards

[log]
mode = console
level = info

[log.console]
format = json

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[paths]
data = /var/lib/grafana
logs = /var/log/grafana
plugins = /var/lib/grafana/plugins
provisioning = /etc/grafana/provisioning
