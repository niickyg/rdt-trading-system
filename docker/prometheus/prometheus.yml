# Prometheus Configuration for RDT Trading System
# Scrape metrics from the trading application and other services

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'rdt-trading-monitor'

# Alerting configuration (optional, for future alertmanager integration)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Rule files for alerting
rule_files:
  - "alert_rules.yml"

# Scrape configuration
scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    metrics_path: /metrics

  # RDT Trading Web Application
  - job_name: 'rdt-web'
    static_configs:
      - targets: ['web:8080']
    metrics_path: /metrics
    scrape_interval: 10s
    scrape_timeout: 5s

  # RDT Scanner Service (if running separately)
  - job_name: 'rdt-scanner'
    static_configs:
      - targets: ['scanner:8080']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # RDT Bot Service (if running separately)
  - job_name: 'rdt-bot'
    static_configs:
      - targets: ['bot:8080']
    metrics_path: /metrics
    scrape_interval: 30s
    scrape_timeout: 10s

  # PostgreSQL (via postgres_exporter if deployed)
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']

  # Redis (via redis_exporter if deployed)
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
