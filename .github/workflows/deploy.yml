name: Deploy Pipeline

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag to deploy (leave empty for latest)'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      image_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == format('refs/tags/{0}', github.ref_name) }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
            VCS_REF=${{ github.sha }}
            VERSION=${{ steps.meta.outputs.version }}

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
          format: spdx-json
          output-file: sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 90

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: staging
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Staging
        id: deploy
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          DEPLOY_ENV: staging
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          echo "Deploying $REGISTRY_IMAGE:$IMAGE_TAG to $DEPLOY_ENV..."

          # Create deployment manifest
          cat > deploy-staging.yaml << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: rdt-trading-system
            namespace: staging
            labels:
              app: rdt-trading-system
              environment: staging
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: rdt-trading-system
            template:
              metadata:
                labels:
                  app: rdt-trading-system
                  version: "${IMAGE_TAG}"
              spec:
                containers:
                - name: rdt-trading-system
                  image: ${REGISTRY_IMAGE}:${IMAGE_TAG}
                  ports:
                  - containerPort: 5000
                  envFrom:
                  - configMapRef:
                      name: rdt-trading-config
                  - secretRef:
                      name: rdt-trading-secrets
                  resources:
                    requests:
                      memory: "512Mi"
                      cpu: "250m"
                    limits:
                      memory: "2Gi"
                      cpu: "1000m"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 5000
                    initialDelaySeconds: 30
                    periodSeconds: 10
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 5000
                    initialDelaySeconds: 5
                    periodSeconds: 5
          EOF

          echo "Staging deployment manifest created"
          echo "url=https://staging.rdt-trading.example.com" >> $GITHUB_OUTPUT

          # In a real deployment, you would run:
          # kubectl apply -f deploy-staging.yaml
          # kubectl rollout status deployment/rdt-trading-system -n staging --timeout=300s

      - name: Wait for deployment
        run: |
          echo "Waiting for staging deployment to stabilize..."
          sleep 10
          echo "Staging deployment complete"

  smoke-tests-staging:
    name: Smoke Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: Run smoke tests
        env:
          STAGING_URL: https://staging.rdt-trading.example.com
        run: |
          echo "Running smoke tests against staging environment..."

          # Create smoke test script
          cat > smoke_tests.py << 'EOF'
          import os
          import sys

          def test_health_endpoint():
              """Test that health endpoint responds correctly."""
              print("Testing health endpoint...")
              # In real scenario: response = requests.get(f"{os.environ['STAGING_URL']}/health")
              # assert response.status_code == 200
              print("Health check passed (simulated)")
              return True

          def test_ready_endpoint():
              """Test that ready endpoint responds correctly."""
              print("Testing ready endpoint...")
              # In real scenario: response = requests.get(f"{os.environ['STAGING_URL']}/ready")
              # assert response.status_code == 200
              print("Ready check passed (simulated)")
              return True

          def test_api_response():
              """Test that API returns valid response."""
              print("Testing API response...")
              # In real scenario: response = requests.get(f"{os.environ['STAGING_URL']}/api/v1/status")
              # assert response.status_code == 200
              # assert 'status' in response.json()
              print("API check passed (simulated)")
              return True

          if __name__ == "__main__":
              tests = [test_health_endpoint, test_ready_endpoint, test_api_response]
              results = []
              for test in tests:
                  try:
                      results.append(test())
                  except Exception as e:
                      print(f"Test failed: {e}")
                      results.append(False)

              if all(results):
                  print("\nAll smoke tests passed!")
                  sys.exit(0)
              else:
                  print("\nSome smoke tests failed!")
                  sys.exit(1)
          EOF

          python smoke_tests.py

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build-and-push, smoke-tests-staging]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine image tag
        id: image
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ needs.build-and-push.outputs.image_tag }}" >> $GITHUB_OUTPUT
          fi

      - name: Get current deployment for rollback
        id: current
        run: |
          echo "Capturing current deployment state for potential rollback..."
          # In real scenario:
          # CURRENT_IMAGE=$(kubectl get deployment rdt-trading-system -n production -o jsonpath='{.spec.template.spec.containers[0].image}')
          # echo "current_image=$CURRENT_IMAGE" >> $GITHUB_OUTPUT
          echo "current_image=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:previous" >> $GITHUB_OUTPUT

      - name: Deploy to Production
        id: deploy
        env:
          IMAGE_TAG: ${{ steps.image.outputs.tag }}
          DEPLOY_ENV: production
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          echo "Deploying $REGISTRY_IMAGE:$IMAGE_TAG to $DEPLOY_ENV..."

          # Create production deployment manifest
          cat > deploy-production.yaml << EOF
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: rdt-trading-system
            namespace: production
            labels:
              app: rdt-trading-system
              environment: production
          spec:
            replicas: 3
            strategy:
              type: RollingUpdate
              rollingUpdate:
                maxSurge: 1
                maxUnavailable: 0
            selector:
              matchLabels:
                app: rdt-trading-system
            template:
              metadata:
                labels:
                  app: rdt-trading-system
                  version: "${IMAGE_TAG}"
              spec:
                containers:
                - name: rdt-trading-system
                  image: ${REGISTRY_IMAGE}:${IMAGE_TAG}
                  ports:
                  - containerPort: 5000
                  envFrom:
                  - configMapRef:
                      name: rdt-trading-config
                  - secretRef:
                      name: rdt-trading-secrets
                  resources:
                    requests:
                      memory: "1Gi"
                      cpu: "500m"
                    limits:
                      memory: "4Gi"
                      cpu: "2000m"
                  livenessProbe:
                    httpGet:
                      path: /health
                      port: 5000
                    initialDelaySeconds: 30
                    periodSeconds: 10
                    failureThreshold: 3
                  readinessProbe:
                    httpGet:
                      path: /ready
                      port: 5000
                    initialDelaySeconds: 5
                    periodSeconds: 5
                    failureThreshold: 3
          EOF

          echo "Production deployment manifest created"
          echo "url=https://rdt-trading.example.com" >> $GITHUB_OUTPUT

          # In a real deployment:
          # kubectl apply -f deploy-production.yaml
          # kubectl rollout status deployment/rdt-trading-system -n production --timeout=600s

      - name: Wait for deployment
        run: |
          echo "Waiting for production deployment to stabilize..."
          sleep 15
          echo "Production deployment complete"

  smoke-tests-production:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy-production

    outputs:
      success: ${{ steps.tests.outputs.success }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests pytest

      - name: Run production smoke tests
        id: tests
        env:
          PRODUCTION_URL: https://rdt-trading.example.com
        run: |
          echo "Running smoke tests against production environment..."

          cat > smoke_tests_prod.py << 'EOF'
          import os
          import sys
          import time

          def test_health_endpoint():
              """Test that health endpoint responds correctly."""
              print("Testing health endpoint...")
              # response = requests.get(f"{os.environ['PRODUCTION_URL']}/health", timeout=10)
              # assert response.status_code == 200
              print("Health check passed (simulated)")
              return True

          def test_ready_endpoint():
              """Test that ready endpoint responds correctly."""
              print("Testing ready endpoint...")
              # response = requests.get(f"{os.environ['PRODUCTION_URL']}/ready", timeout=10)
              # assert response.status_code == 200
              print("Ready check passed (simulated)")
              return True

          def test_api_response():
              """Test that API returns valid response."""
              print("Testing API response...")
              # response = requests.get(f"{os.environ['PRODUCTION_URL']}/api/v1/status", timeout=10)
              # assert response.status_code == 200
              print("API check passed (simulated)")
              return True

          def test_latency():
              """Test that response latency is acceptable."""
              print("Testing response latency...")
              # start = time.time()
              # response = requests.get(f"{os.environ['PRODUCTION_URL']}/health", timeout=10)
              # latency = time.time() - start
              # assert latency < 2.0, f"Latency too high: {latency}s"
              print("Latency check passed (simulated)")
              return True

          if __name__ == "__main__":
              tests = [test_health_endpoint, test_ready_endpoint, test_api_response, test_latency]
              results = []
              for test in tests:
                  try:
                      results.append(test())
                  except Exception as e:
                      print(f"Test failed: {e}")
                      results.append(False)

              if all(results):
                  print("\nAll production smoke tests passed!")
                  sys.exit(0)
              else:
                  print("\nSome production smoke tests failed!")
                  sys.exit(1)
          EOF

          if python smoke_tests_prod.py; then
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "success=false" >> $GITHUB_OUTPUT
            exit 1
          fi

  rollback:
    name: Rollback Production
    runs-on: ubuntu-latest
    needs: [deploy-production, smoke-tests-production]
    if: failure() && needs.deploy-production.result == 'success'

    steps:
      - name: Rollback deployment
        env:
          REGISTRY_IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          echo "Production smoke tests failed! Initiating rollback..."

          # In a real rollback scenario:
          # kubectl rollout undo deployment/rdt-trading-system -n production
          # kubectl rollout status deployment/rdt-trading-system -n production --timeout=300s

          echo "Rollback initiated"
          echo "Previous deployment restored"

      - name: Notify rollback
        run: |
          echo "Sending rollback notification..."
          # In real scenario, send Slack/email notification
          echo "Rollback completed. Please investigate the failed deployment."

      - name: Create rollback issue
        uses: actions/github-script@v7
        with:
          script: |
            const issue = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Production Deployment Rollback - ${new Date().toISOString()}`,
              body: `## Deployment Rollback Alert

              A production deployment was automatically rolled back due to failed smoke tests.

              **Details:**
              - Workflow Run: ${context.runId}
              - Commit: ${context.sha}
              - Ref: ${context.ref}

              **Action Required:**
              1. Review the smoke test failures
              2. Investigate the root cause
              3. Fix the issues before re-deploying

              [View Workflow Run](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `,
              labels: ['deployment', 'rollback', 'urgent']
            });
            console.log(`Created issue #${issue.data.number}`);

  notify-success:
    name: Notify Deployment Success
    runs-on: ubuntu-latest
    needs: [smoke-tests-production]
    if: success()

    steps:
      - name: Send success notification
        run: |
          echo "Deployment successful!"
          echo "All smoke tests passed in production."
          # In real scenario, send Slack/email notification
