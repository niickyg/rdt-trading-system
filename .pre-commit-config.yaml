# Pre-commit configuration for RDT Trading System
# See https://pre-commit.com for more information
# See https://pre-commit.com/hooks.html for more hooks

default_language_version:
  python: python3.11

default_stages: [commit, push]

repos:
  # General hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-symlinks
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: end-of-file-fixer
        exclude: ^(data/|\.parquet$)
      - id: trailing-whitespace
        exclude: ^(data/|\.parquet$)
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: debug-statements
      - id: check-docstring-first

  # Black - code formatting
  - repo: https://github.com/psf/black
    rev: 24.1.1
    hooks:
      - id: black
        language_version: python3.11
        args:
          - --config=pyproject.toml
        exclude: ^(data/|migrations/)

  # isort - import sorting
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args:
          - --settings-path=pyproject.toml
        exclude: ^(data/|migrations/)

  # Flake8 - style guide enforcement
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        args:
          - --config=.flake8
        additional_dependencies:
          - flake8-bugbear
          - flake8-comprehensions
          - flake8-simplify
          - flake8-docstrings
          - pep8-naming
        exclude: ^(data/|migrations/|__pycache__/)

  # Pylint - code analysis
  - repo: https://github.com/pylint-dev/pylint
    rev: v3.0.3
    hooks:
      - id: pylint
        args:
          - --rcfile=pyproject.toml
          - --exit-zero
        additional_dependencies:
          - pandas
          - numpy
          - pydantic
          - flask
          - sqlalchemy
        exclude: ^(data/|migrations/|tests/)

  # MyPy - type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.8.0
    hooks:
      - id: mypy
        args:
          - --config-file=pyproject.toml
          - --ignore-missing-imports
          - --no-error-summary
        additional_dependencies:
          - types-requests
          - types-python-dateutil
          - pandas-stubs
          - types-PyYAML
        exclude: ^(data/|migrations/|tests/)

  # Bandit - security linting
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        args:
          - -r
          - --severity-level=medium
          - --confidence-level=medium
          - -x=tests,data,.venv
          - --configfile=pyproject.toml
        exclude: ^(tests/|data/|\.venv/)

  # detect-secrets - credential scanning
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args:
          - --baseline
          - .secrets.baseline
        exclude: ^(data/|\.env\.example|tests/fixtures/)

  # Safety - dependency vulnerability checking
  - repo: https://github.com/Lucas-C/pre-commit-hooks-safety
    rev: v1.3.3
    hooks:
      - id: python-safety-dependencies-check
        files: requirements.*\.txt$

  # Prettier - formatting for non-Python files
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        types_or: [yaml, json, markdown]
        exclude: ^(data/|\.github/workflows/)

  # Commitizen - commit message linting
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v3.13.0
    hooks:
      - id: commitizen
        stages: [commit-msg]

  # Custom local hooks
  - repo: local
    hooks:
      - id: check-env-example
        name: Check .env.example exists
        entry: bash -c 'test -f .env.example'
        language: system
        pass_filenames: false

      - id: check-no-secrets-in-code
        name: Check for hardcoded secrets
        entry: bash -c 'grep -rn --include="*.py" -E "(password|secret|api_key|token)\s*=\s*['\''\"]\w+" . --exclude-dir=.venv --exclude-dir=tests --exclude-dir=data && exit 1 || exit 0'
        language: system
        pass_filenames: false

      - id: pytest-check
        name: Run pytest quick check
        entry: bash -c 'pytest tests/ -x -q --no-header 2>/dev/null || true'
        language: system
        pass_filenames: false
        stages: [push]

ci:
  autofix_prs: true
  autofix_commit_msg: |
    [pre-commit.ci] auto fixes from hooks

    for more information, see https://pre-commit.ci
  autoupdate_branch: develop
  autoupdate_commit_msg: '[pre-commit.ci] pre-commit autoupdate'
  autoupdate_schedule: weekly
  skip: [pylint, mypy, pytest-check]
  submodules: false
