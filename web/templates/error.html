<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ error_title | default('Error') }} - RDT Trading System</title>
    <style>
        :root {
            --primary: #0d1117;
            --secondary: #111827;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text: #e5e7eb;
            --text-light: #9ca3af;
            --bg: #0a0e17;
            --card: #111827;
            --border: #1e293b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text);
            line-height: 1.6;
        }
        a { color: var(--accent); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .error-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
        }

        .error-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .error-logo {
            font-size: 2rem;
            font-weight: bold;
            color: white;
            margin-bottom: 10px;
        }

        .error-card {
            background: var(--card);
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px 35px;
            text-align: center;
        }

        .error-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 25px;
            background: rgba(245,158,11,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .error-icon svg {
            width: 40px;
            height: 40px;
            color: var(--warning);
        }

        .error-title {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text);
        }

        .error-message {
            color: var(--text-light);
            margin-bottom: 25px;
            font-size: 1rem;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            margin: 5px;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
        }
        .btn-primary:hover {
            background: var(--accent-hover);
            text-decoration: none;
        }
        .btn-secondary {
            background: var(--bg);
            color: var(--text);
        }
        .btn-secondary:hover {
            background: var(--border);
            text-decoration: none;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.9rem;
        }
        .back-link a:hover {
            color: white;
        }

        .error-code {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-header">
            <div class="error-logo">RDT Trading</div>
        </div>

        <div class="error-card">
            <div class="error-icon">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/>
                </svg>
            </div>

            <h1 class="error-title">{{ error_title | default('Something went wrong') }}</h1>
            <p class="error-message">{{ error_message | default('An unexpected error occurred. Please try again.') }}</p>

            <div class="btn-group">
                {% if show_login %}
                <a href="{{ url_for('auth.login') }}" class="btn btn-primary">Go to Login</a>
                {% else %}
                <a href="/" class="btn btn-primary">Go Home</a>
                {% endif %}
                <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
            </div>

            {% if error_code %}
            <p class="error-code">Error Code: {{ error_code }}</p>
            {% endif %}
        </div>

        <div class="back-link">
            <a href="/dashboard">Back to Dashboard</a>
        </div>
    </div>
</body>
</html>
