{% extends "base.html" %}
{% block title %}404 - Page Not Found{% endblock %}
{% block content %}
<div class="container" style="text-align: center; padding: 100px 20px;">
    <h1 style="font-size: 6rem; color: var(--text-light); margin-bottom: 20px;">404</h1>
    <h2 style="margin-bottom: 15px;">Page Not Found</h2>
    <p style="color: var(--text-light); margin-bottom: 30px;">The page you're looking for doesn't exist or has been moved.</p>
    <a href="/" class="btn btn-primary">Go Home</a>
    <a href="/dashboard" class="btn btn-secondary" style="margin-left: 10px;">Dashboard</a>
</div>
{% endblock %}
