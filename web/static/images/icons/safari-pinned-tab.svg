<?xml version="1.0" encoding="UTF-8"?>
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- RDT Trading System - Safari Pinned Tab Icon -->
    <!-- This should be a monochrome (single color) SVG -->

    <!-- Chart background -->
    <rect x="10" y="20" width="80" height="60" rx="5" fill="none" stroke="#000" stroke-width="4"/>

    <!-- Upward trending line (trading chart) -->
    <polyline points="20,65 35,55 50,60 65,40 80,30"
              fill="none"
              stroke="#000"
              stroke-width="5"
              stroke-linecap="round"
              stroke-linejoin="round"/>

    <!-- Arrow at the end of the line -->
    <polygon points="80,30 72,32 74,40" fill="#000"/>

    <!-- Grid lines -->
    <line x1="20" y1="70" x2="80" y2="70" stroke="#000" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="50" x2="80" y2="50" stroke="#000" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="30" x2="80" y2="30" stroke="#000" stroke-width="1" opacity="0.5"/>
</svg>
